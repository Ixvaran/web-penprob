<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Website pembelajaran interaktif Distribusi Normal - Pelajari distribusi normal, normal baku, dan invers normal baku dengan visualisasi interaktif" />
    <title>Distribusi Normal | Pembelajaran Interaktif</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = storedTheme || (systemDark ? 'dark' : 'light');

        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.classList.toggle('light', theme !== 'dark');
      })();
    </script>
    <style>
      html:not(.theme-ready) *,
      html:not(.theme-ready) *::before,
      html:not(.theme-ready) *::after {
        transition: none !important;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preload" as="video" type="video/mp4" href="/videos/hero-dark.mp4">
    <link rel="preload" as="video" type="video/mp4" href="/videos/hero-light.mp4">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
